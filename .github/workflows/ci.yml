name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-js-version: '18'
        cache: 'npm'
        
    - run: npm install
    - run: npm run build
    - name: Run unit test simulations
      run: |
        node test-streaming-usage.js
        node test-token-extract.js
